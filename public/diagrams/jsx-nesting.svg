<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" width="640" height="260">
  <title>JSX must return a single parent element</title>
  <style>
    .label { font: 600 15px system-ui, sans-serif; }
    .tag { font: 13px 'SFMono-Regular', Menlo, monospace; }
    .box { fill: #f8fafc; stroke: #e2e8f0; }
    .bad { fill: #b91c1c; }
    .good { fill: #15803d; }
    .child { fill: #e0e7ff; stroke: #6366f1; }
    .parent { fill: #eef2ff; stroke: #4338ca; }
    .mark { font: 700 20px system-ui, sans-serif; }
  </style>

  <text x="20" y="30" class="label bad">Invalid: two siblings</text>
  <rect x="20" y="50" width="120" height="46" rx="8" class="child" />
  <text x="34" y="78" class="tag">&lt;img /&gt;</text>
  <rect x="20" y="110" width="120" height="46" rx="8" class="child" />
  <text x="34" y="138" class="tag">&lt;h1&gt;…&lt;/h1&gt;</text>
  <text x="160" y="105" class="mark bad">✗</text>

  <text x="360" y="30" class="label good">Valid: one parent</text>
  <rect x="360" y="50" width="240" height="150" rx="10" class="parent" />
  <text x="374" y="78" class="tag">&lt;div className="card"&gt;</text>
  <rect x="384" y="92" width="150" height="40" rx="8" class="child" />
  <text x="398" y="118" class="tag">&lt;img /&gt;</text>
  <rect x="384" y="142" width="150" height="40" rx="8" class="child" />
  <text x="398" y="168" class="tag">&lt;h1&gt;…&lt;/h1&gt;</text>
  <text x="612" y="130" class="mark good">✓</text>
</svg>
